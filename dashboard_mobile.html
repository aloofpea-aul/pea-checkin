<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard PEA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
  :root {
    --primary: #005A9C;
    --primary-dark: #003f6e;
    --primary-light: #E3F0FB;
    --success: #2E7D32;
    --success-light: #E8F5E9;
    --danger: #C62828;
    --danger-light: #FFEBEE;
    --warning: #E65100;
    --warning-light: #FFF3E0;
    --bg: #F0F4F8;
    --card: #FFFFFF;
    --text: #1A2B3C;
    --muted: #6B7C8F;
    --border: #D1DCE8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white; padding: 16px; position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; flex-direction: column; }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-date { font-size: 12px; opacity: 0.75; margin-top: 2px; }
  .refresh-btn {
    background: rgba(255,255,255,0.2); border: none; border-radius: 10px;
    color: white; padding: 8px 14px; font-family: 'Sarabun', sans-serif;
    font-size: 13px; cursor: pointer; font-weight: 600;
  }

  /* Tab Bar */
  .tab-bar {
    display: flex; background: white; border-bottom: 1px solid var(--border);
    position: sticky; top: 62px; z-index: 99; overflow-x: auto;
  }
  .tab-btn {
    flex: 1; padding: 12px 8px; border: none; background: transparent;
    font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent;
    white-space: nowrap; min-width: 80px;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* Content */
  .content { padding: 12px; }
  .tab-page { display: none; }
  .tab-page.active { display: block; }

  /* Stats Grid */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card {
    background: white; border-radius: 14px; padding: 14px 12px;
    box-shadow: 0 2px 8px rgba(0,90,156,0.08); display: flex; align-items: center; gap: 10px;
  }
  .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .stat-icon.blue { background: var(--primary-light); }
  .stat-icon.green { background: var(--success-light); }
  .stat-icon.red { background: var(--danger-light); }
  .stat-icon.yellow { background: #FFF9C4; }
  .stat-label { font-size: 11px; color: var(--muted); }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.2; }

  /* Card */
  .card { background: white; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,90,156,0.08); margin-bottom: 14px; overflow: hidden; }
  .card-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 14px; font-weight: 700; }

  /* Donut */
  .donut-wrap { padding: 16px; display: flex; align-items: center; gap: 16px; }
  .donut-svg { width: 90px; height: 90px; flex-shrink: 0; }
  .donut-legend { flex: 1; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Employee List */
  .emp-list { }
  .emp-row {
    display: flex; align-items: center; padding: 12px 16px;
    border-bottom: 1px solid #F0F4F8; gap: 12px;
  }
  .emp-row:last-child { border-bottom: none; }
  .emp-avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .emp-info { flex: 1; min-width: 0; }
  .emp-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .emp-time { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .emp-badge { flex-shrink: 0; }

  /* Badge */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: var(--success-light); color: var(--success); }
  .badge-red { background: var(--danger-light); color: var(--danger); }
  .badge-yellow { background: var(--warning-light); color: var(--warning); }
  .badge-gray { background: #F0F4F8; color: var(--muted); }

  /* Filter */
  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; }
  input[type="date"], input[type="month"] {
    flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-family: 'Sarabun', sans-serif; font-size: 14px;
    background: white; outline: none;
  }
  input[type="date"]:focus, input[type="month"]:focus { border-color: var(--primary); }

  .btn-sm {
    padding: 10px 14px; border: none; border-radius: 10px;
    font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-success { background: var(--success); color: white; }

  /* History Table → Card style on mobile */
  .history-list { }
  .history-card {
    background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,90,156,0.06);
  }
  .history-name { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .history-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .history-label { color: var(--muted); }
  .history-value { font-weight: 600; }

  /* Monthly */
  .monthly-card {
    background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,90,156,0.06);
  }
  .monthly-name { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: var(--primary); }
  .monthly-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .monthly-item { background: var(--bg); border-radius: 8px; padding: 8px; text-align: center; }
  .monthly-item-label { font-size: 11px; color: var(--muted); }
  .monthly-item-value { font-size: 16px; font-weight: 700; margin-top: 2px; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .spinner-small {
    width: 30px; height: 30px; border: 3px solid var(--border);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty */
  .empty { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }

  /* Summary button */
  .send-btn {
    width: 100%; padding: 14px; background: var(--primary); color: white;
    border: none; border-radius: 12px; font-family: 'Sarabun', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 14px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-title">📊 Dashboard PEA</div>
    <div class="header-date" id="headerDate">—</div>
  </div>
  <button class="refresh-btn" onclick="loadToday()">🔄 รีเฟรช</button>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('today', this)">📅 วันนี้</button>
  <button class="tab-btn" onclick="switchTab('history', this)">📋 ประวัติ</button>
  <button class="tab-btn" onclick="switchTab('monthly', this)">📈 รายเดือน</button>
</div>

<!-- Content -->
<div class="content">

  <!-- Tab: Today -->
  <div class="tab-page active" id="tab-today">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">👥</div>
        <div><div class="stat-label">ทั้งหมด</div><div class="stat-value" id="statTotal">—</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div><div class="stat-label">เช็คอินแล้ว</div><div class="stat-value" id="statIn">—</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">⚠️</div>
        <div><div class="stat-label">ยังไม่เช็คอิน</div><div class="stat-value" id="statNotIn">—</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon yellow">🚪</div>
        <div><div class="stat-label">เช็คเอ้าต์แล้ว</div><div class="stat-value" id="statOut">—</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">🥧 สัดส่วนเข้างาน</div>
      </div>
      <div class="donut-wrap">
        <svg class="donut-svg" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="38" fill="none" stroke="#F0F4F8" stroke-width="16"/>
          <circle cx="50" cy="50" r="38" fill="none" stroke="#005A9C" stroke-width="16"
            stroke-dasharray="0 239" id="donutArc" stroke-linecap="round"
            style="transition:stroke-dasharray 0.8s ease;" transform="rotate(-90 50 50)"/>
          <text x="50" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#1A2B3C" id="donutPct">0%</text>
          <text x="50" y="58" text-anchor="middle" font-size="7" fill="#6B7C8F">เช็คอิน</text>
        </svg>
        <div class="donut-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#005A9C"></div><span id="legendIn">เช็คอินแล้ว: —</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:#C62828"></div><span id="legendNotIn">ยังไม่เช็คอิน: —</span></div>
        </div>
      </div>
    </div>

    <button class="send-btn" onclick="sendSummary()">📤 ส่ง Summary ให้ Admin</button>

    <div class="card">
      <div class="card-header">
        <div class="card-title">รายละเอียดวันนี้</div>
      </div>
      <div class="emp-list" id="todayList">
        <div class="loading"><div class="spinner-small"></div>กำลังโหลด...</div>
      </div>
    </div>
  </div>

  <!-- Tab: History -->
  <div class="tab-page" id="tab-history">
    <div class="filter-row">
      <input type="date" id="historyDate">
      <button class="btn-sm btn-primary" onclick="loadHistory()">ค้นหา</button>
    </div>
    <div id="historyList"><div class="empty">เลือกวันที่เพื่อดูประวัติ</div></div>
  </div>

  <!-- Tab: Monthly -->
  <div class="tab-page" id="tab-monthly">
    <div class="filter-row">
      <input type="month" id="monthPicker">
      <button class="btn-sm btn-primary" onclick="loadMonthly()">ค้นหา</button>
    </div>
    <div id="monthlyList"><div class="empty">เลือกเดือนเพื่อดูสรุป</div></div>
  </div>

</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxvp0SfzVwAwp0lfGS9OrpdmE0yJ9DlizJY82LIv9G7oxI_oZ4nn9QlxPc-lsx8z7v9/exec';

  // ==================== Init ====================
  window.onload = () => {
    setHeaderDate();
    loadToday();
    const today = new Date();
    document.getElementById('historyDate').value = fmtDate(today);
    document.getElementById('monthPicker').value = fmtMonth(today);
  };

  function setHeaderDate() {
    const d = new Date();
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
    document.getElementById('headerDate').textContent =
      `วัน${days[d.getDay()]}ที่ ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()+543}`;
  }

  // ==================== Tab Switch ====================
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  // ==================== API ====================
  async function gasGet(params) {
    const url = GAS_URL + '?' + new URLSearchParams(params).toString();
    const res = await fetch(url, { redirect: 'follow' });
    const text = await res.text();
    try { return JSON.parse(text); } catch(e) { return null; }
  }

  // ==================== Today ====================
  async function loadToday() {
    document.getElementById('todayList').innerHTML = '<div class="loading"><div class="spinner-small"></div>กำลังโหลด...</div>';
    const data = await gasGet({ action: 'getTodayDashboard' });
    if (!data || !data.records) { document.getElementById('todayList').innerHTML = '<div class="empty">โหลดไม่สำเร็จ</div>'; return; }
    renderToday(data.records);
  }

  function renderToday(records) {
    const total = records.length;
    const checked = records.filter(r => r.checkIn).length;
    const notChecked = total - checked;
    const checkedOut = records.filter(r => r.checkOut).length;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statIn').textContent = checked;
    document.getElementById('statNotIn').textContent = notChecked;
    document.getElementById('statOut').textContent = checkedOut;

    const pct = total > 0 ? Math.round(checked/total*100) : 0;
    const circ = 239;
    document.getElementById('donutArc').setAttribute('stroke-dasharray', `${circ*pct/100} ${circ}`);
    document.getElementById('donutArc').style.stroke = pct >= 80 ? '#2E7D32' : pct >= 50 ? '#005A9C' : '#C62828';
    document.getElementById('donutPct').textContent = pct + '%';
    document.getElementById('legendIn').textContent = `เช็คอินแล้ว: ${checked} คน`;
    document.getElementById('legendNotIn').textContent = `ยังไม่เช็คอิน: ${notChecked} คน`;

    const list = document.getElementById('todayList');
    if (!records.length) { list.innerHTML = '<div class="empty">ไม่มีข้อมูล</div>'; return; }

    list.innerHTML = records.map(r => {
      const statusBadge = r.checkOut
        ? '<span class="badge badge-green">เช็คเอ้าต์แล้ว</span>'
        : r.checkIn
          ? '<span class="badge badge-yellow">กำลังทำงาน</span>'
          : '<span class="badge badge-red">ยังไม่เช็คอิน</span>';

      const timeText = r.checkIn
        ? `เข้า ${r.checkIn}${r.checkOut ? ' • ออก ' + r.checkOut : ''}`
        : 'ยังไม่เช็คอิน';

      return `<div class="emp-row">
        <div class="emp-avatar">👤</div>
        <div class="emp-info">
          <div class="emp-name">${r.name}</div>
          <div class="emp-time">${timeText}</div>
        </div>
        <div class="emp-badge">${statusBadge}</div>
      </div>`;
    }).join('');
  }

  // ==================== History ====================
  async function loadHistory() {
    const date = document.getElementById('historyDate').value;
    if (!date) return;
    document.getElementById('historyList').innerHTML = '<div class="loading"><div class="spinner-small"></div>กำลังโหลด...</div>';
    const data = await gasGet({ action: 'getAttendanceByDate', dateStr: date });
    if (!data || !Array.isArray(data)) { document.getElementById('historyList').innerHTML = '<div class="empty">โหลดไม่สำเร็จ</div>'; return; }

    if (!data.length) { document.getElementById('historyList').innerHTML = '<div class="empty">ไม่มีข้อมูลวันที่เลือก</div>'; return; }

    document.getElementById('historyList').innerHTML = data.map(r => {
      const hrs = r.workMinutes ? `${Math.floor(r.workMinutes/60)} ชม. ${r.workMinutes%60} นาที` : '—';
      const areaBadge = r.area === 'นอกพื้นที่'
        ? '<span class="badge badge-yellow">นอกพื้นที่</span>'
        : r.area ? '<span class="badge badge-green">ในพื้นที่</span>' : '';
      return `<div class="history-card">
        <div class="history-name">👤 ${r.name} ${areaBadge}</div>
        <div class="history-row"><span class="history-label">⏰ เช็คอิน</span><span class="history-value">${r.checkIn ? r.checkIn + ' น.' : '—'}</span></div>
        <div class="history-row"><span class="history-label">🚪 เช็คเอ้าต์</span><span class="history-value">${r.checkOut ? r.checkOut + ' น.' : '—'}</span></div>
        <div class="history-row"><span class="history-label">⏱️ รวม</span><span class="history-value">${hrs}</span></div>
        <div class="history-row"><span class="history-label">📍 ระยะห่าง</span><span class="history-value">${r.distIn ? r.distIn + ' เมตร' : '—'}</span></div>
        ${r.note ? `<div class="history-row"><span class="history-label">📝 หมายเหตุ</span><span class="history-value">${r.note}</span></div>` : ''}
      </div>`;
    }).join('');
  }

  // ==================== Monthly ====================
  async function loadMonthly() {
    const month = document.getElementById('monthPicker').value;
    if (!month) return;
    document.getElementById('monthlyList').innerHTML = '<div class="loading"><div class="spinner-small"></div>กำลังโหลด...</div>';
    const data = await gasGet({ action: 'getMonthlySummary', monthStr: month });
    if (!data || !Array.isArray(data)) { document.getElementById('monthlyList').innerHTML = '<div class="empty">โหลดไม่สำเร็จ</div>'; return; }

    if (!data.length) { document.getElementById('monthlyList').innerHTML = '<div class="empty">ไม่มีข้อมูลเดือนที่เลือก</div>'; return; }

    document.getElementById('monthlyList').innerHTML = data.map(r => {
      const avgHrs = r.avgMinutes ? `${Math.floor(r.avgMinutes/60)}ชม.${r.avgMinutes%60}น.` : '—';
      const totalHrs = r.totalMinutes ? `${Math.floor(r.totalMinutes/60)}ชม.${r.totalMinutes%60}น.` : '—';
      return `<div class="monthly-card">
        <div class="monthly-name">👤 ${r.name}</div>
        <div class="monthly-grid">
          <div class="monthly-item">
            <div class="monthly-item-label">วันทำงาน</div>
            <div class="monthly-item-value" style="color:var(--primary)">${r.workDays} วัน</div>
          </div>
          <div class="monthly-item">
            <div class="monthly-item-label">เฉลี่ย/วัน</div>
            <div class="monthly-item-value" style="color:var(--success)">${avgHrs}</div>
          </div>
          <div class="monthly-item">
            <div class="monthly-item-label">รวมชั่วโมง</div>
            <div class="monthly-item-value">${totalHrs}</div>
          </div>
          <div class="monthly-item">
            <div class="monthly-item-label">มาสาย</div>
            <div class="monthly-item-value" style="color:${r.lateCount>0?'var(--danger)':'var(--success)'}">${r.lateCount} ครั้ง</div>
          </div>
          <div class="monthly-item">
            <div class="monthly-item-label">นอกพื้นที่</div>
            <div class="monthly-item-value" style="color:${r.outsideCount>0?'var(--warning)':'var(--success)'}">${r.outsideCount} ครั้ง</div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // ==================== Send Summary ====================
  async function sendSummary() {
    if (!confirm('ส่ง Summary LINE ให้ Admin ตอนนี้เลยไหมครับ?')) return;
    const res = await gasGet({ action: 'sendSummary' });
    alert(res && res.success ? '✅ ส่ง Summary สำเร็จ' : '❌ ส่งไม่สำเร็จ');
  }

  // ==================== Helpers ====================
  function fmtDate(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function fmtMonth(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }
</script>
</body>
</html>
